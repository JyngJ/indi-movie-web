name: 상영시간표 수집

on:
  schedule:
    # 한국 시간 10:00 / 16:00 / 22:00 (UTC 01:00 / 07:00 / 13:00)
    - cron: '0 1,7,13 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Vercel 크롤 API 트리거
        run: |
          echo "크롤 시작 요청..."
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/admin/crawl/all" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30)

          echo "HTTP $STATUS"
          cat /tmp/response.json

          if [ "$STATUS" != "202" ]; then
            echo "크롤 API 실패 (HTTP $STATUS)"
            exit 1
          fi
          echo "크롤 시작됨 — 결과는 Discord로 전송됩니다."
