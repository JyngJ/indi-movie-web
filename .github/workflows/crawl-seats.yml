name: 좌석 현황 갱신

on:
  schedule:
    # 매 2시간마다 (1시간으로 바꾸려면 '0 * * * *')
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Vercel 좌석 API 트리거
        run: |
          echo "좌석 갱신 요청..."
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/admin/crawl/seats" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 130)

          echo "HTTP $STATUS"
          cat /tmp/response.json

          if [ "$STATUS" != "200" ]; then
            echo "좌석 API 실패 (HTTP $STATUS)"
            exit 1
          fi
