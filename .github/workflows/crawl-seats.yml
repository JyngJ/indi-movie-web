name: 좌석 현황 갱신

on:
  schedule:
    # 매 2시간마다 (1시간으로 바꾸려면 '0 * * * *')
    - cron: '0 */2 * * *'
  workflow_dispatch: # 수동 실행 허용

jobs:
  seats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: 좌석 현황 갱신
        run: npx tsx scripts/crawl-seats.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_REPORT_WEBHOOK_URL: ${{ secrets.DISCORD_REPORT_WEBHOOK_URL }}
